name: update-org-readme

# Manual-trigger fallback for the org profile README generator.
#
# The PRIMARY automation path is a local crontab entry on the lab admin's
# WSL host (`~/repos/ont-ecosystem/skills/org-readme/` runs daily at
# 12:00 UTC via `crontab -l`). That cron has full org-wide gh CLI auth
# and refreshes both the public (.github) and member (.github-private)
# views.
#
# This workflow exists only as:
#   1. A manually-triggerable refresh button in the GitHub Actions UI.
#   2. A future-ready hook in case org-wide PAT/App auth is added later
#      (set secrets.LAB_ORG_README_PAT to enable; otherwise this no-ops
#      gracefully without overwriting the comprehensive version).
#
# No `schedule:` block — daily refresh is owned by local cron.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force-publish even when content matches"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-org-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify gh CLI is available
        run: gh --version

      - name: Render and publish org README
        # Auth precedence:
        #   1. LAB_ORG_README_PAT (org-wide PAT) — required for .github-private auto-update
        #      and for the renderer to see all 85 repos (default GITHUB_TOKEN sees only 12 public).
        #   2. GITHUB_TOKEN fallback — public README only. Private repo + private listing skipped.
        # The script tolerates the missing private auth gracefully; the run still succeeds.
        env:
          GH_TOKEN: ${{ secrets.LAB_ORG_README_PAT || secrets.GITHUB_TOKEN }}
          FORCE_FLAG: ${{ inputs.force == true && '--force' || '' }}
          # If LAB_ORG_README_PAT is missing, skip the private push to avoid the guaranteed 404.
          NO_PRIVATE_FLAG: ${{ secrets.LAB_ORG_README_PAT && '' || '--no-private' }}
        run: |
          python .github/scripts/render_org_readme.py $FORCE_FLAG $NO_PRIVATE_FLAG

      - name: Upload run log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: org-readme-run-log
          path: ~/.cache/org-readme/last-run.json
          if-no-files-found: ignore
          retention-days: 14
