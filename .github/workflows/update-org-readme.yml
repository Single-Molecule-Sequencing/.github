name: update-org-readme

# Manual-trigger fallback for the org profile README generator.
#
# The PRIMARY automation path is a local crontab entry on the lab admin's
# WSL host (`~/repos/ont-ecosystem/skills/org-readme/` runs daily at
# 12:00 UTC via `crontab -l`). That cron has full org-wide gh CLI auth
# and refreshes both the public (.github) and member (.github-private)
# views.
#
# This workflow exists only as:
#   1. A manually-triggerable refresh button in the GitHub Actions UI.
#   2. A future-ready hook in case org-wide PAT/App auth is added later
#      (set secrets.LAB_ORG_README_PAT to enable; otherwise this no-ops
#      gracefully without overwriting the comprehensive version).
#
# No `schedule:` block — daily refresh is owned by local cron.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force-publish even when content matches"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-org-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify gh CLI is available
        run: gh --version

      - name: Render and publish org README
        # Uses only the workflow's auto-issued GITHUB_TOKEN — no PAT, no secrets.
        # That token can see ~12 public repos (not all 85), so the script's
        # MIN_REPOS_FOR_PUBLISH=50 guard refuses to overwrite the comprehensive
        # version with a stub. Effectively this means: this workflow no-ops
        # gracefully on every manual click. The real refresh comes from the
        # local crontab on the lab admin's host (see SKILL.md).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_FLAG: ${{ inputs.force == true && '--force' || '' }}
        run: |
          python .github/scripts/render_org_readme.py $FORCE_FLAG --no-private

      - name: Upload run log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: org-readme-run-log
          path: ~/.cache/org-readme/last-run.json
          if-no-files-found: ignore
          retention-days: 14
